name: govease
description: "GovEase - Your Digital Bridge to Local Government Services"
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  animate_do: ^4.2.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  file_picker: ^8.1.4
  mime: ^2.0.0
  cloud_functions: ^6.0.7
  payhere_mobilesdk_flutter: ^3.2.2
  shared_preferences: ^2.5.3
  sqflite: ^2.4.1
  path: ^1.9.1
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.4
  share_plus: ^12.0.2
  pdf: ^3.12.0
  path_provider: ^2.1.5
  printing: ^5.14.3
  firebase_messaging: ^16.1.3
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2
  logger: ^2.7.0
  firebase_crashlytics: ^5.1.0
  flutter_image_compress: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  encrypt: ^5.0.3
  translator: ^1.0.4+1
  shimmer: ^3.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/govease-logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
    - .env


